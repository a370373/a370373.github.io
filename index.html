<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生！日！快！樂！👀</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Microsoft JhengHei",sans-serif;
    background:black;
}

/* ===== 幻燈片 ===== */
.slideshow{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;

    opacity:0;
    transform:scale(1.08);

    /* 👇 一開始模糊 + 暗 */
    filter:blur(8px) brightness(0.6);

    transition:
        opacity 2.5s ease-in-out,
        filter 4s ease-in-out,
        transform 6s ease-in-out;
}

.slide.active{
    opacity:1;
    transform:scale(1);

    /* 👇 慢慢清晰 */
    filter:blur(0px) brightness(1);
}

/* ===== 文字 ===== */
.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    text-align:center;
    color:white;
}

.message{
    font-size:22px;
    line-height:1.8;
    min-height:120px;
    text-shadow:0 0 10px rgba(0,0,0,0.6);
}

/* 游標 */
.cursor{
    display:inline-block;
    animation:blink 0.8s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

/* 按鈕 */
button{
    margin-top:30px;
    padding:10px 24px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:rgba(255,255,255,0.35);
}

/* 手機 */
@media(max-width:768px){
.message{font-size:18px;}
}
</style>
</head>

<!-- 文字 -->
<div class="content">

<div class="message" id="message"></div>

<button onclick="nextMessage()">下一句</button>

</div>

<script>

/* ===== 文字 ===== */
const messages = [

`小金魚👀`,
`我們在一起七個月又三天惹👀🤔`,
`這是我陪妳過的第一個生日👀`,
`未來的每一年我都會陪妳過👀`,
`不可能缺席的🤔嘿嘿👀`,
`雖然我現在沒辦法給妳什麼`,
`只能先給妳這個👀`,
`一點小小的心意👀`,
`希望妳喜歡👀`,
`禮物在未來的某一天會補給妳👀`,
`生日快樂👀徐彩菱👀`,
`好啦👀來聽我給妳唱的歌👀<br>
<a href="https://photos.app.goo.gl/A14LoLi3Jq7xu9KQ6" 
target="_blank"
style="color:#fff;text-decoration:underline;">
點這裡聽歌👀
</a>`

];

let i = 0;
let typing = false;

/* ===== 打字機 ===== */
function typeText(text){

    const el = document.getElementById("message");
    el.innerHTML = "";

    let index = 0;
    typing = true;

    const timer = setInterval(()=>{

        el.innerHTML =
        text.substring(0,index) +
        `<span class="cursor">▍</span>`;

        index++;

        if(index > text.length){
            clearInterval(timer);
            typing = false;
            el.innerHTML = text;
        }

    },60);

}

/* ===== 下一句 ===== */
function nextMessage(){

    if(typing) return;

    typeText(messages[i]);

    i++;
    if(i >= messages.length){
        i = 0;
    }
}

/* ===== 幻燈片切換 ===== */
const slides = document.querySelectorAll(".slide");

let cur = 0;

setInterval(()=>{

    slides[cur].classList.remove("active");

    cur++;
    if(cur >= slides.length) cur = 0;

    slides[cur].classList.add("active");

},5000);

</script>
